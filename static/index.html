<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Passport Photo Editor</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">📷</div>
    <div>
      <h1>Passport Photo Editor</h1>
      <span class="tag">100% offline · runs on your computer</span>
    </div>
  </div>
</header>

<main>
  <!-- 1. UPLOAD -->
  <section class="card" id="step-upload">
    <div class="step-head"><span class="step-num">1</span><h2>Upload your photo</h2></div>
    <div id="dropzone" class="dropzone">
      <div class="dropzone-inner">
        <div class="dz-icon">⬆</div>
        <div class="dz-title">Drag &amp; drop a photo here</div>
        <div class="dz-sub">or click to browse · JPEG / PNG / HEIC</div>
        <input type="file" id="file" accept="image/*" hidden />
      </div>
    </div>
  </section>

  <!-- 2. FACE CHECK -->
  <section class="card" id="step-detect" hidden>
    <div class="step-head"><span class="step-num">2</span><h2>Face check</h2></div>
    <div id="detect-status" class="status"></div>
    <div class="canvas-wrap"><canvas id="orig-canvas"></canvas></div>
  </section>

  <!-- 3. BACKGROUND -->
  <section class="card" id="step-bg" hidden>
    <div class="step-head"><span class="step-num">3</span><h2>Background</h2></div>
    <button class="btn primary" id="btn-remove">
      <span class="btn-label">Remove background</span>
      <span class="spinner" hidden></span>
    </button>

    <div id="bg-controls" hidden>
      <p class="section-label">Choose a background color</p>
      <div class="palette" id="palette"></div>
      <div class="custom-color">
        <label>
          Custom
          <input type="color" id="bg-color" value="#ffffff" />
        </label>
        <span id="hex-display" class="hex">#ffffff</span>
      </div>

      <p class="section-label">Preview</p>
      <div class="canvas-wrap"><canvas id="final-canvas"></canvas></div>
    </div>
  </section>

  <!-- 4. SHEET -->
  <section class="card" id="step-sheet" hidden>
    <div class="step-head"><span class="step-num">4</span><h2>Print sheet</h2></div>

    <div class="grid-2">
      <div class="controls">
        <div class="field">
          <label for="paper">Paper</label>
          <select id="paper"></select>
        </div>
        <div class="field">
          <label for="photo-size">Photo size</label>
          <select id="photo-size"></select>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="dpi">DPI</label>
            <input type="number" id="dpi" value="300" min="150" max="600" />
          </div>
          <div class="field">
            <label for="margin">Margin (mm)</label>
            <input type="number" id="margin" value="5" min="0" max="20" />
          </div>
          <div class="field">
            <label for="gap">Gap (mm)</label>
            <input type="number" id="gap" value="3" min="0" max="20" />
          </div>
        </div>
        <label class="check"><input type="checkbox" id="cut" checked /> show cut lines</label>

        <div id="layout-info" class="layout-info"></div>

        <button class="btn primary big" id="btn-sheet">
          <span class="btn-label">Generate &amp; download PDF</span>
          <span class="spinner" hidden></span>
        </button>
        <div id="sheet-status" class="status"></div>
      </div>

      <div class="preview-wrap">
        <p class="section-label centered">Live sheet preview</p>
        <div id="sheet-preview" class="sheet-preview"></div>
      </div>
    </div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
